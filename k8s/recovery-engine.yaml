apiVersion: apps/v1
kind: Deployment
metadata:
  name: bcdr-recovery-engine
  namespace: bcdr-ops
spec:
  replicas: 4
  selector:
    matchLabels:
      app: recovery-engine
  template:
    metadata:
      labels:
        app: recovery-engine
    spec:
      containers:
      - name: engine
        image: devopstrio/bcdr-recovery-engine:latest
        env:
        - name: RECOVERY_MODE
          value: "ACTIVE"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: bcdr-secrets
              key: db-url
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: recovery-engine-svc
  namespace: bcdr-ops
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: recovery-engine
